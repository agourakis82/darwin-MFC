<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="helixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2137"/>
      <stop offset="50%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="helixGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  
  <!-- The Double Helix D -->
  <!-- Main D backbone (semi-circle) -->
  <path 
    d="M20 8 L20 56 M20 8 C44 8 52 20 52 32 C52 44 44 56 20 56" 
    stroke="url(#helixGradient)" 
    stroke-width="4" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- Helix strand 1 (front) -->
  <path 
    d="M20 14 Q32 18 38 22 Q44 26 44 32 Q44 38 38 42 Q32 46 20 50" 
    stroke="url(#helixGradientLight)" 
    stroke-width="3" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- Helix strand 2 (back) -->
  <path 
    d="M20 22 Q28 26 34 30 Q40 34 40 32 Q40 30 34 34 Q28 38 20 42" 
    stroke="url(#helixGradient)" 
    stroke-width="2.5" 
    stroke-linecap="round" 
    fill="none"
    opacity="0.7"
  />
  
  <!-- Base pair connections (horizontal lines representing DNA base pairs) -->
  <line x1="22" y1="18" x2="36" y2="20" stroke="#0E7490" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="26" x2="40" y2="28" stroke="#059669" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="32" x2="44" y2="32" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="38" x2="40" y2="36" stroke="#059669" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="46" x2="36" y2="44" stroke="#0E7490" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Small nucleotide dots at base pair ends -->
  <circle cx="36" cy="20" r="2" fill="#0E7490"/>
  <circle cx="40" cy="28" r="2" fill="#059669"/>
  <circle cx="44" cy="32" r="2.5" fill="#06B6D4"/>
  <circle cx="40" cy="36" r="2" fill="#059669"/>
  <circle cx="36" cy="44" r="2" fill="#0E7490"/>
</svg>