# Darwin-MFC Nginx Configuration
# ===============================
# Optimized for serving Next.js static export

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Root redirect to default locale (Portuguese)
        location = / {
            return 302 /pt/;
        }

        # Handle Next.js static exports with trailingSlash: true
        location / {
            try_files $uri $uri/ $uri/index.html =404;
        }

        # Cache static assets
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Cache images and icons
        location ~* \.(ico|png|jpg|jpeg|gif|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public";
        }

        # Cache fonts
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public";
        }

        # Custom 404 page
        error_page 404 /404/index.html;
        location = /404/index.html {
            internal;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
